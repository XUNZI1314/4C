name: CI - Smoke Test Docker Image (no WSL)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  smoke-test:
    name: Build and smoke-test container
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --progress=plain -t protein-visualizer:smoke .

      - name: Run container
        run: |
          docker run -d --name protein-smoke -p 8501:8501 protein-visualizer:smoke

      - name: Wait for Streamlit to respond
        run: |
          echo "Waiting for Streamlit to start..."
          status=""
          for i in $(seq 1 30); do
            status=$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:8501 || true)
            echo "Attempt $i -> HTTP $status"
            if [ "$status" = "200" ] || [ "$status" = "302" ] || [ "$status" = "301" ]; then
              echo "Service ready"
              exit 0
            fi
            sleep 5
          done
          echo "Service did not respond in time. Container logs:";
          docker logs --tail 200 protein-smoke || true
          exit 1

      - name: Smoke test fetch homepage
        run: |
          curl -sS http://localhost:8501 | head -n 20

      - name: Cleanup
        if: always()
        run: |
          docker rm -f protein-smoke || true

name: CI - Verify GHCR Pull and Run

on:
  workflow_dispatch: {}

permissions:
  contents: read
  packages: read

jobs:
  verify-pull:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        run: |
          OWNER_LOWER=${{ github.repository_owner }}
          OWNER_LOWER=$(echo "$OWNER_LOWER" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/$OWNER_LOWER/protein-visualizer" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          docker pull $IMAGE_NAME:latest
          docker images $IMAGE_NAME --format '{{.Repository}}:{{.Tag}} {{.ID}} {{.Size}}'

      - name: Run container and basic smoke check
        run: |
          docker run -d --name ghcr-verify -p 8501:8501 $IMAGE_NAME:latest || true
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8501 || true)
            echo "Attempt $i -> HTTP $status"
            if [ "$status" = "200" ] || [ "$status" = "302" ]; then
              echo "Service ready"
              break
            fi
            sleep 5
          done
          docker logs --tail 200 ghcr-verify || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f ghcr-verify || true
